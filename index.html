<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magic JSON Converter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <a class="email-link" href="mailto:hbradroc@uwo.ca" aria-label="Email hbradroc@uwo.ca">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Zm0 4.2-8 5.2-8-5.2V6l8 5 8-5v2.2Z" />
          </svg>
          <span>hbradroc@uwo.ca</span>
        </a>

        <h1>Magic 2026 Converter</h1>
        <p class="sub">Upload workbook + SysCAD txt. Template is loaded automatically.</p>

        <div class="field">
          <label for="workbookFile">Excel workbook (.xlsm)</label>
          <input id="workbookFile" type="file" accept=".xlsm,.xlsx" />
        </div>

        <div class="field">
          <label for="syscadFile">SysCAD text file (.txt)</label>
          <input id="syscadFile" type="file" accept=".txt" />
        </div>

        <div class="field inline">
          <label for="templateFile">Optional template override</label>
          <input id="templateFile" type="file" accept=".json" />
        </div>

        <button id="convertBtn" type="button">Convert And Download JSON</button>

        <pre id="log" class="log" aria-live="polite"></pre>
      </section>
      <p class="footer-note">Systemair 467</p>
    </main>
  </body>
</html>
